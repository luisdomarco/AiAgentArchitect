# Onboarding Layer

The "first contact" experience for new users. When absent, AiAgentArchitect still works — but new users land in `wor-agentic-architect` cold, without a guided tour of what they're looking at.

## Why a layer

Experienced users can suppress the auto-tour by touching the welcome marker manually:

```
touch memory/welcome-shown.md
```

This skips auto-invocation; the workflow remains explicitly callable as `/wor-onboarding`.

## Components in this version (0.1.0)

- **`wor-onboarding`** — root-level guided tour, 5 screens + verification + first-step prompt + welcome marker.

## Components planned for a future version

- **`wor-subsystem-tour`** — analogous tour for any subsystem generated with the Onboarding layer embedded. Auto-invoked on the subsystem's first use.
- **`ski-subsystem-onboarding`** — skill that the entity builder calls during Step 3 to render a tour parameterized for the subsystem's name, agents, and use cases.
- **`tpl-onboarding`** — template consumed by `ski-subsystem-onboarding`.

These are deferred until `wor-agentic-architect` is updated to read active layers and emit the corresponding templates at Step 3.
