# Context Ledger Layer

Capa de registro estructurado y dependency state transfer entre agentes. Es la columna vertebral de la traceability del sistema.

## Estructura del ledger

Directorio `context-ledger/` con un archivo por sesión:

```
context-ledger/YYYY-MM-DD-HH-MM-{project-name}.md
```

Frontmatter + blocks append-only:

```markdown
---
schema_version: 1.0
system: foo-system
workflow: wor-agentic-architect
project_name: foo-system
target_dir: exports/foo-system/
mode: architect
created: 2026-04-25T14:32:00Z
last_updated: 2026-04-25T15:45:00Z
---

<!-- Context Ledger — append-only. Do not overwrite previous blocks. -->

## [Step 0] — age-spe-input-enricher — completed

### Input received
{contexto recibido}

### Reasoning Trace
<sys-eval>...</sys-eval>

### Generated output
{handoff JSON output}

### Metrics
input_tokens: 1234
output_tokens: 567
duration_ms: 4200

### Metadata
- Timestamp: 2026-04-25T14:35:00Z
- Step: 0 of N
```

## Append-only

Hard constraint: cada `write` añade nuevos blocks. Nunca overwrite. `last_updated` en frontmatter sí se actualiza in-place.

## Context Map (filtrado selectivo)

El Orchestrator define en cada workflow una tabla `step destino → fuente → fields → mode`:
- `mode=complete`: extrae full output + reasoning_trace del step anterior.
- `mode=partial`: extrae solo fields específicos.

Antes de invocar Step N, se llama `ski-context-ledger read` con el Context Map y se inyecta solo el contexto necesario.

## Multi-proyecto paralelo

Cada proyecto tiene su propio ledger por timestamp. Sin colisiones.

## Promoción de `kno-handoff-schemas` al desactivar

Este knowledge-base define el contrato de handoff JSON usado por todos los workflows del framework. Si la capa `context-ledger` se desactiva, `ski-layer-embed` promociona automáticamente `kno-handoff-schemas.md` a `.agents/knowledge-base/` raíz para que los workflows sigan teniendo acceso al contrato (los handoffs siguen funcionando, solo no se persisten en ledger).
