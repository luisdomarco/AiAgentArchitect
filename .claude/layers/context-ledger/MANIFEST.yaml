# Context Ledger Layer

Structured logging and dependency state transfer between agents. Backbone of system traceability.

## Ledger structure

Directory `context-ledger/` with one file per session:

```
context-ledger/YYYY-MM-DD-HH-MM-{project-name}.md
```

Frontmatter + append-only blocks:

```markdown
---
schema_version: 1.0
system: foo-system
workflow: wor-agentic-architect
project_name: foo-system
target_dir: exports/foo-system/
mode: architect
created: 2026-04-25T14:32:00Z
last_updated: 2026-04-25T15:45:00Z
---

<!-- Context Ledger — append-only. Do not overwrite previous blocks. -->

## [Step 0] — age-spe-input-enricher — completed

### Input received
{received context}

### Reasoning Trace
<sys-eval>...</sys-eval>

### Generated output
{handoff JSON output}

### Metrics
input_tokens: 1234
output_tokens: 567
duration_ms: 4200

### Metadata
- Timestamp: 2026-04-25T14:35:00Z
- Step: 0 of N
```

## Append-only

Hard constraint: every `write` adds new blocks. Never overwrite. `last_updated` in frontmatter is updated in place.

## Context Map (selective filtering)

The orchestrator defines, per workflow, a table `destination step → source → fields → mode`:
- `mode=complete`: extracts full output + reasoning_trace from the previous step.
- `mode=partial`: extracts only the specified fields.

Before invoking Step N, `ski-context-ledger read` is called with the Context Map to inject only the context that step needs.

## Parallel multi-project

Each project has its own ledger keyed by timestamp. No collisions.

## Promotion of `kno-handoff-schemas` on disable

This knowledge-base defines the handoff JSON contract used by every workflow in the framework. If the `context-ledger` layer is disabled, `ski-layer-embed` automatically promotes `kno-handoff-schemas.md` to `.agents/knowledge-base/` root so workflows keep access to the contract (handoffs keep working — they simply do not persist in a ledger).
