# Help Router Layer

Context-aware help menus, the `/help` command behind them, and the script that keeps the entities registry up to date.

## Components

- **`ski-help-router`** — the skill that the `/help` command invokes. It loads `repository/entities-registry.csv`, the active Memory snapshot (if Memory layer is active), and `config/manifest.yaml`, then renders a menu of context-relevant options.
- **`menus.csv`** — co-located with the skill. Defines, for each known context (e.g. `cp-s2-pending`, `mid-step`, `root-no-project`), what options to show and which require specific layers to be active.
- **`scripts/build-registry.py`** — scans `.agents/` (including `.agents/layers/`) for entity files, parses their frontmatter, and writes `repository/entities-registry.csv`. Run it after adding/removing entities, or wire it into a hook that runs on file change.
- **`commands/help.md`** — Claude Code slash-command shim that invokes the skill.

## Why a separate layer?

Discoverability is what makes a workflow feel guided. A user inside the workflow shouldn't need to remember every command — the system should *show* what's relevant now. Putting this behind a layer means a user who prefers the raw invocation flow can simply disable `help-router` and get the original behavior back.

## Graceful degradation

- If the Memory layer is off, the router cannot read session state. It assumes `root-no-project` context and offers the entry-point menu.
- If `entities-registry.csv` does not exist, the router prompts the user to run `python3 .agents/layers/help-router/scripts/build-registry.py`.
- If a menu option references a layer that is not enabled in `config/manifest.yaml`, that option is silently filtered out.
