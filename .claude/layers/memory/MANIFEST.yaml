# Memory Layer

Capa de persistencia ligera cross-sesión. Permite reanudar trabajo en cualquier proyecto sin necesidad de releer el Context Ledger completo.

## Estructura del snapshot

```yaml
---
schema_version: 1.0
project-name: foo-system
session: 2026-04-25-14-32
mode: architect | express
status: in-progress | completed | paused
last-checkpoint: CP-S2
checkpoints-approved: [CP-S0, CP-S1, CP-S2]
checkpoint_decisions:
  CP-S0: { option: A, note: "Aprobado directo" }
  CP-S1: { option: B, note: "Ajustado: añadidos 2 triggers" }
target-dir: exports/foo-system/
last_session_at: 2026-04-25T14:32:00Z
---

## Session summary
## Steps completed
## Active state
## Key decisions
```

## Multi-proyecto paralelo

Cada proyecto tiene su propio archivo de Memory determinado por `{project-name}` en el filename. No hay colisiones; load-last es determinístico por timestamp.
