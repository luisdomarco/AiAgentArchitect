# Memory Layer

Lightweight cross-session persistence. Lets the user resume work on any project without re-reading the full Context Ledger.

## Snapshot structure

```yaml
---
schema_version: 1.0
project-name: foo-system
session: 2026-04-25-14-32
mode: architect | express
status: in-progress | completed | paused
last-checkpoint: CP-S2
checkpoints-approved: [CP-S0, CP-S1, CP-S2]
checkpoint_decisions:
  CP-S0: { option: A, note: "Approved as-is" }
  CP-S1: { option: B, note: "Adjusted: added 2 triggers" }
target-dir: exports/foo-system/
last_session_at: 2026-04-25T14:32:00Z
---

## Session summary
## Steps completed
## Active state
## Key decisions
```

## Parallel multi-project

Each project has its own Memory file keyed by `{project-name}` in the filename. No collisions; `load-last` is deterministic by timestamp.
