# AiAgentArchitect Lite — Base configuration (defaults)
#
# This file is versionable and represents the canonical defaults for runtime
# behavior of AiAgentArchitect Lite. It is layered with config.team.toml and
# config.user.toml by `scripts/resolve-config.py`, which writes the merged
# result to `config/.resolved.toml` (.gitignored).
#
# Precedence (lowest to highest):
#   1. config.base.toml      (this file, defaults)
#   2. config.team.toml      (team overrides, versionable)
#   3. config.user.toml      (personal overrides, .gitignored)
#   4. CLI flags             (highest, ad-hoc per invocation)
#
# A field can be locked at the team level by setting `lock_at_team = true`
# in config.team.toml. Locked fields cannot be overridden by user or CLI.
#
# Do not edit this file to customize behavior. Use config.team.toml or
# config.user.toml instead.

[runtime]
# Default operating mode for wor-agentic-architect.
# Values: "express" (single entity, fast) | "architect" (full multi-agent system)
default_mode = "architect"

# Output language for generated content (ISO 639-1 code).
# Values: "en" | "es"
language = "en"

# Auto-approve intermediate checkpoints (CP-S0..CP-S3). CP-CLOSE always remains manual.
# Use for batch generation or CI pipelines.
headless = false

# Verbosity level for orchestrator narration to the user.
# Values: "debug" | "info" | "warn" | "error"
log_level = "info"

[onboarding]
# Auto-invoke `wor-onboarding` on first session (when welcome marker is absent).
auto_invoke = true

# Filesystem marker that suppresses auto-onboarding once first run completes.
welcome_shown_marker = "memory/welcome-shown.md"

[help_router]
# Use the entities registry + current session state to render context-aware menus
# when the user invokes `/help`.
context_aware = true

[layer_embed]
# Default policy when activating a layer that has unresolved dependencies.
# When true, ski-layer-embed silently activates dependencies first.
# When false, ski-layer-embed aborts with an error.
auto_resolve_deps = true
